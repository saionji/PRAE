# track_registry.yaml — master track-state table (single source of truth)
# Template source: PRAE/runtime/abstract/track_registry.template.yaml
# Spec reference: methodology/PRAE_ARTIFACTS.md §2.3

project: "{{project_name}}"          # project name, matching the directory name
current_cycle: 1                      # current research cycle (incremented each time a CONTINUE reopens the project)
current_phase: phase_00_infra         # current phase (updated after the phase gate is approved)
updated: "{{YYYY-MM-DD}}"            # last update date
# The following project-level fields are filled in as needed (written by the tools at the Phase 3 final state or on CONTINUE)
# project_decision: ARCHIVED | GRADUATED_TO_PDAE | CONTINUE
# project_approver: "{{user_id}}"
# project_decided_at: "{{YYYY-MM-DD}}"
# project_reopened_at: "{{YYYY-MM-DD}}"   # filled in only after a CONTINUE reopen
# project_finalized_at: "{{YYYY-MM-DD}}"  # filled in only for a final-state decision
# archived_at: "{{YYYY-MM-DD}}"           # filled in only for ARCHIVED

# ===========================================================================
# tracks list: one entry per track
# Valid state values (see methodology/PRAE_CORE_MODEL.md §2):
#   infrastructure: EXPLORING → LOCKED
#   research:       EXPLORING → ACTIVE → KILLED / MERGED / GRADUATED
# ===========================================================================

tracks:

  # -------------------------------------------------------------------------
  # Infrastructure track example
  # -------------------------------------------------------------------------
  - id: infra_{{name}}_v1             # naming rule: infra_{name}_v{N}
    type: infrastructure
    state: EXPLORING                   # initial state
    src: src/infra_{{name}}_v1/
    # The following fields are filled in after LOCKED (written by the Executor once PDAE M3 passes):
    module_spec: ~                     # src/infra_{{name}}_v1/MODULE_SPEC.md
    contracts: ~                       # src/infra_{{name}}_v1/contracts.yaml
    locked_at: ~                       # YYYY-MM-DD

  # -------------------------------------------------------------------------
  # Research track example
  # -------------------------------------------------------------------------
  - id: research_{{topic}}_{{variant}} # naming rule: research_{topic}_{variant}
    type: research
    state: EXPLORING                   # initial state
    src: src/tracks/research_{{topic}}_{{variant}}/
    hypothesis: "{{one-sentence falsifiable hypothesis}}"
    depends_on:
      - infra_{{name}}_v1             # list of infrastructure track IDs this track depends on
    experiments: 0                    # number of experiments run (AI auto-increments after each EXP)
    evidence_summary: ~               # append a one-sentence summary after each experiment (maintained by the AI)
    # The following fields are filled in when the track ends:
    concluded_at: ~                   # YYYY-MM-DD
    merged_into: ~                    # fill in the target track ID only when state=MERGED
