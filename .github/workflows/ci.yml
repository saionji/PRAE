name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest pytest-cov

      - name: Environment info
        run: |
          {
            echo "## Environment for Python ${{ matrix.python-version }}"
            echo ""
            echo "- python: $(python -V 2>&1)"
            echo "- pytest: $(pytest --version 2>&1)"
            echo "- pyyaml: $(python -c 'import yaml; print(yaml.__version__)')"
            echo "- pwd: $(pwd)"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run unit tests
        run: |
          set -o pipefail
          pytest tests/unit -v --tb=long 2>&1 | tee /tmp/pytest-unit.log
          EXIT=$?
          {
            echo "## Unit tests (Python ${{ matrix.python-version }}) exit=$EXIT"
            echo ""
            echo '```'
            tail -200 /tmp/pytest-unit.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT

      - name: Run integration tests
        run: |
          set -o pipefail
          pytest tests/integration -v --tb=long 2>&1 | tee /tmp/pytest-int.log
          EXIT=$?
          {
            echo "## Integration tests (Python ${{ matrix.python-version }}) exit=$EXIT"
            echo ""
            echo '```'
            tail -200 /tmp/pytest-int.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT
